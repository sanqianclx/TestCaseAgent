<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1120" width="1280" height="1120">
  <style>
    text {
      font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      fill: #111827;
    }
    .layer {
      font-size: 20px;
      font-weight: 700;
    }
    .section-title {
      font-size: 22px;
      font-weight: 700;
    }
    .box-title {
      font-size: 16px;
      font-weight: 700;
    }
    .box-sub {
      font-size: 13px;
      fill: #0d65f1ff;
    }
    .note {
      font-size: 13px;
      fill: #374151;
    }
    .legend {
      font-size: 13px;
      fill: #374151;
    }
  </style>

  <defs>
    <marker id="arrowDark" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#374151"/>
    </marker>
    <marker id="arrowDash" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#6b7280"/>
    </marker>
    <filter id="softShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#111827" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1280" height="1120" fill="#ffffff"/>

  <!-- Left layer labels -->
  <text x="42" y="70" class="layer">接入层</text>
  <text x="42" y="225" class="layer">Agent</text>
  <text x="42" y="254" class="layer">编排层</text>
  <text x="42" y="420" class="layer">工具层</text>
  <text x="42" y="450" class="layer">能力模块</text>
  <text x="28" y="625" class="layer">执行与诊断层</text>
  <text x="42" y="900" class="layer">数据层</text>
  <text x="42" y="930" class="layer">版本化存储</text>

  <!-- Access layer -->
  <rect x="160" y="24" width="1060" height="76" rx="8" fill="#f8fbff" stroke="#3b82f6" stroke-width="1.6" filter="url(#softShadow)"/>
  <rect x="300" y="42" width="150" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="375" y="68" text-anchor="middle" class="box-title" fill="#ffffff">CLI</text>
  <rect x="780" y="42" width="170" height="40" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="865" y="68" text-anchor="middle" class="box-title" fill="#ffffff">Web UI</text>

  <path d="M 690 100 L 690 150" stroke="#374151" stroke-width="1.6" fill="none" marker-end="url(#arrowDark)"/>
  <rect x="580" y="118" width="220" height="28" rx="14" fill="#ffffff"/>
  <text x="690" y="138" text-anchor="middle" class="box-title">发起任务 / 提交需求</text>

  <!-- Agent orchestration layer -->
  <rect x="160" y="180" width="1060" height="150" rx="8" fill="#f3fbf4" stroke="#22c55e" stroke-width="1.6" filter="url(#softShadow)"/>
  <text x="690" y="218" text-anchor="middle" class="section-title">Agent 编排器（统一入口）</text>

  <rect x="195" y="250" width="178" height="56" rx="7" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.2"/>
  <text x="284" y="273" text-anchor="middle" class="box-title">状态机管理</text>
  <text x="284" y="294" text-anchor="middle" class="box-sub">任务生命周期</text>

  <rect x="400" y="250" width="178" height="56" rx="7" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.2"/>
  <text x="489" y="273" text-anchor="middle" class="box-title">工具调度</text>
  <text x="489" y="294" text-anchor="middle" class="box-sub">按需调用</text>

  <rect x="605" y="250" width="178" height="56" rx="7" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.2"/>
  <text x="694" y="273" text-anchor="middle" class="box-title">风险检查</text>
  <text x="694" y="294" text-anchor="middle" class="box-sub">安全与合规</text>

  <rect x="810" y="250" width="178" height="56" rx="7" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.2"/>
  <text x="899" y="273" text-anchor="middle" class="box-title">退出条件</text>
  <text x="899" y="294" text-anchor="middle" class="box-sub">完成/失败/中止</text>

  <rect x="1015" y="250" width="178" height="56" rx="7" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.2"/>
  <text x="1104" y="273" text-anchor="middle" class="box-title">上下文管理</text>
  <text x="1104" y="294" text-anchor="middle" class="box-sub">会话与状态</text>

  <path d="M 690 330 L 690 380" stroke="#374151" stroke-width="1.6" fill="none" marker-end="url(#arrowDark)"/>
  <rect x="574" y="350" width="232" height="28" rx="14" fill="#ffffff"/>
  <text x="690" y="370" text-anchor="middle" class="box-title">调度工具 / 获取结果</text>

  <!-- Tool layer -->
  <rect x="160" y="410" width="1060" height="142" rx="8" fill="#fffaf0" stroke="#f59e0b" stroke-width="1.6" filter="url(#softShadow)"/>

  <rect x="180" y="438" width="120" height="86" rx="7" fill="#fff7e6" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="240" y="468" text-anchor="middle" class="box-title">AST解析</text>
  <text x="240" y="493" text-anchor="middle" class="box-sub">代码理解</text>

  <rect x="312" y="438" width="120" height="86" rx="7" fill="#fff7e6" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="372" y="468" text-anchor="middle" class="box-title">LLM摘要</text>
  <text x="372" y="493" text-anchor="middle" class="box-sub">行为理解</text>

  <rect x="444" y="438" width="120" height="86" rx="7" fill="#fff7e6" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="504" y="468" text-anchor="middle" class="box-title">用例生成</text>
  <text x="504" y="493" text-anchor="middle" class="box-sub">测试设计</text>

  <rect x="576" y="438" width="130" height="86" rx="7" fill="#fff7e6" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="641" y="468" text-anchor="middle" class="box-title">pytest代码</text>
  <text x="641" y="493" text-anchor="middle" class="box-sub">测试实现</text>

  <rect x="718" y="438" width="120" height="86" rx="7" fill="#fff7e6" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="778" y="468" text-anchor="middle" class="box-title">质量检查</text>
  <text x="778" y="493" text-anchor="middle" class="box-sub">断言质量</text>

  <rect x="850" y="438" width="120" height="86" rx="7" fill="#fff7e6" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="910" y="468" text-anchor="middle" class="box-title">失败诊断</text>
  <text x="910" y="493" text-anchor="middle" class="box-sub">问题分析</text>

  <rect x="982" y="438" width="120" height="86" rx="7" fill="#fff7e6" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="1042" y="468" text-anchor="middle" class="box-title">版本管理</text>
  <text x="1042" y="493" text-anchor="middle" class="box-sub">快照回溯</text>

  <rect x="1114" y="438" width="86" height="86" rx="7" fill="#fff7e6" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="1157" y="468" text-anchor="middle" class="box-title">导出</text>
  <text x="1157" y="493" text-anchor="middle" class="box-sub">报告</text>

  <!-- Execution and diagnosis layer -->
  <path d="M 641 552 L 641 612" stroke="#6b7280" stroke-width="1.6" fill="none" marker-end="url(#arrowDark)"/>
  <rect x="548" y="578" width="186" height="28" rx="14" fill="#ffffff"/>
  <text x="641" y="598" text-anchor="middle" class="box-title">生成测试代码</text>

  <rect x="160" y="632" width="1060" height="220" rx="8" fill="#fbf7ff" stroke="#a855f7" stroke-width="1.6" filter="url(#softShadow)"/>

  <rect x="188" y="658" width="430" height="164" rx="8" fill="#ffffff" stroke="#a855f7" stroke-width="1.2" stroke-dasharray="8 5"/>
  <rect x="215" y="676" width="376" height="40" rx="5" fill="#f5ecff" stroke="#a855f7" stroke-width="1.1" stroke-dasharray="7 4"/>
  <text x="403" y="702" text-anchor="middle" class="box-title">隔离执行环境（临时工作目录）</text>

  <rect x="236" y="742" width="130" height="54" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.2"/>
  <text x="301" y="765" text-anchor="middle" class="box-title">测试代码</text>
  <text x="301" y="786" text-anchor="middle" class="box-sub">test_*.py</text>

  <path d="M 382 770 L 444 770" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#arrowDark)"/>
  <text x="413" y="756" text-anchor="middle" class="note">写入</text>

  <rect x="458" y="736" width="120" height="70" rx="7" fill="#faf5ff" stroke="#a855f7" stroke-width="1.2"/>
  <text x="518" y="766" text-anchor="middle" class="box-title">pytest</text>
  <text x="518" y="790" text-anchor="middle" class="box-sub">子进程执行</text>

  <path d="M 618 770 L 760 770" stroke="#374151" stroke-width="1.6" fill="none" marker-end="url(#arrowDark)"/>
  <text x="690" y="753" text-anchor="middle" class="note" fill="#ffffff">执行结果</text>

  <text x="690" y="791" text-anchor="middle" class="box-sub">exit code</text>

  <rect x="778" y="676" width="394" height="130" rx="7" fill="#ffffff" stroke="#a855f7" stroke-width="1.2"/>
  <text x="975" y="706" text-anchor="middle" class="box-title">诊断模块</text>
  <text x="812" y="738" class="note">• 测试代码问题：断言错误、用例缺陷</text>
  <text x="812" y="766" class="note">• 源代码运行错误：异常、崩溃、依赖缺失</text>
  <text x="812" y="794" class="note">• 行为不一致 / 信息不足 / 无法判断</text>

  <path d="M 910 632 L 910 552" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="7 5" fill="none" marker-end="url(#arrowDash)"/>
  <rect x="930" y="586" width="150" height="28" rx="14" fill="#ffffff"/>
  <text x="1005" y="606" text-anchor="middle" class="box-title">诊断结果反馈</text>

  <!-- Data layer -->
  <rect x="160" y="900" width="370" height="150" rx="8" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5" filter="url(#softShadow)"/>
  <rect x="180" y="916" width="330" height="36" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.1"/>
  <text x="345" y="940" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">V1.0（本地）</text>

  <rect x="198" y="970" width="142" height="54" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="269" y="994" text-anchor="middle" class="box-title">本地文件系统</text>
  <text x="269" y="1014" text-anchor="middle" class="box-sub">源码/测试/报告</text>

  <rect x="354" y="970" width="142" height="54" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="425" y="994" text-anchor="middle" class="box-title">JSON文件</text>
  <text x="425" y="1014" text-anchor="middle" class="box-sub">状态/元数据</text>

  <path d="M 530 974 L 655 974" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="7 5" fill="none" marker-end="url(#arrowDash)"/>
  <text x="592" y="958" text-anchor="middle" class="note">逐步增强</text>

  <rect x="655" y="900" width="410" height="150" rx="8" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5" filter="url(#softShadow)"/>
  <rect x="675" y="916" width="370" height="36" rx="6" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.1"/>
  <text x="860" y="940" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">V3.0（分布式）</text>

  <rect x="692" y="970" width="160" height="54" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="772" y="994" text-anchor="middle" class="box-title">Redis</text>
  <text x="772" y="1014" text-anchor="middle" class="box-sub">缓存/会话/队列</text>

  <rect x="876" y="970" width="154" height="54" rx="6" fill="#ffffff" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="953" y="994" text-anchor="middle" class="box-title">MySQL</text>
  <text x="953" y="1014" text-anchor="middle" class="box-sub">元数据/版本/报告</text>

  <!-- Legend -->
  <rect x="1090" y="900" width="145" height="150" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.2" stroke-dasharray="7 5"/>
  <text x="1162" y="932" text-anchor="middle" class="box-title">图例</text>
  <line x1="1110" y1="960" x2="1166" y2="960" stroke="#374151" stroke-width="1.6" marker-end="url(#arrowDark)"/>
  <text x="1176" y="965" class="legend">控制流</text>
  <line x1="1110" y1="994" x2="1166" y2="994" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="7 5" marker-end="url(#arrowDash)"/>
  <text x="1176" y="999" class="legend">数据流</text>
  <line x1="1110" y1="1028" x2="1166" y2="1028" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="7 5" marker-end="url(#arrowDash)"/>
  <text x="1176" y="1033" class="legend">演进</text>
</svg>
